spring.application.name=mos-learn-demo
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/moslearn?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USERNAME:root}
